spring.application.name=payment-service
server.port=8083
secret.key=secret

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
payment.topic.name=payment
partition.count=5
replica.count=3

spring.kafka.security.protocol=SASL_SSL
spring.kafka.properties.ssl.endpoint.identification.algorithm=
spring.kafka.ssl.trust-store-location=file:../configuration-service/ssl/truststore.jks
spring.kafka.ssl.trust-store-password=password
spring.kafka.ssl.key-store-location=file:../configuration-service/ssl/keystore.jks
spring.kafka.ssl.key-store-password=password
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="eshop_platform_kafka_client" password="password";
