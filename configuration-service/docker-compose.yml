version: "1.0"

networks:
  kafka-net:
    name: kafka-net
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: "no"
    networks:
      - kafka-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 0
      ZOOKEEPER_SECURE_CLIENT_PORT: 2181
      ZOOKEEPER_SSL_CLIENT_ENABLE: true
      ZOOKEEPER_SSL_CLIENT_AUTH: need
      ZOOKEEPER_SSL_TRUSTSTORE_LOCATION: /ssl/truststore.jks
      ZOOKEEPER_SSL_TRUSTSTORE_PASSWORD: password
      ZOOKEEPER_SSL_KEYSTORE_LOCATION: /ssl/keystore.jks
      ZOOKEEPER_SSL_KEYSTORE_PASSWORD: password
      ZOOKEEPER_SERVER_CNXN_FACTORY: org.apache.zookeeper.server.NettyServerCnxnFactory
      ZOOKEEPER_REQUIRE_CLIENT_AUTH_SCHEME: sasl
      ZOOKEEPER_AUTH_PROVIDER_1: org.apache.zookeeper.server.auth.SASLAuthenticationProvider
      KAFKA_OPTS: 
        -Djava.security.auth.login.config=/sasl/jaas.conf
    volumes:
      - ./ssl:/ssl
      - ./sasl:/sasl
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: "no"
    networks:
      - kafka-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: DOCKER_INTERNAL://:29092,DOCKER_EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: DOCKER_INTERNAL://kafka:29092,DOCKER_EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER_INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER_INTERNAL:SASL_SSL,DOCKER_EXTERNAL:SASL_SSL
      KAFKA_SSL_TRUSTSTORE_LOCATION: /ssl/truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: password
      KAFKA_SSL_KEYSTORE_LOCATION: /ssl/keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: password
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      KAFKA_ZOOKEEPER_SSL_CLIENT_ENABLE: true
      KAFKA_ZOOKEEPER_SSL_TRUSTSTORE_LOCATION: /ssl/truststore.jks
      KAFKA_ZOOKEEPER_SSL_TRUSTSTORE_PASSWORD: password
      KAFKA_ZOOKEEPER_SSL_KEYSTORE_LOCATION: /ssl/keystore.jks
      KAFKA_ZOOKEEPER_SSL_KEYSTORE_PASSWORD: password
      KAFKA_ZOOKEEPER_CLIENT_CNXN_SOCKET: org.apache.zookeeper.ClientCnxnSocketNetty
      KAFKA_ZOOKEEPER_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-256
      ZOOKEEPER_SASL_ENABLED: true
      KAFKA_OPTS:
        -Djava.security.auth.login.config=/sasl/jaas.conf
        -Dzookeeper.sasl.client=true
    depends_on:
      - zookeeper
    volumes:
      - ./ssl:/ssl
      - ./sasl:/sasl
      
  kafka2:
